services:
  time-beacon:
    image: time-beacon:latest
    container_name: time-beacon
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "127.0.0.1:18080:8080"
    networks:
      - app_net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "10"
networks:
  app_net:
    external: true
    name: subscription-management_default
